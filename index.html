<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بوابة التقديم - وزارة الصحة | آفاق</title>
    <style>
        :root { 
            --logo-bg: #f2f0e4; /* هذا هو اللون التقريبي لخلفية شعارك */
            --navy: #002c6b; 
            --gold: #D4AF37; 
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, sans-serif; }
        
        body { 
            background-color: var(--logo-bg); /* توحيد لون الصفحة كاملة */
            color: #333;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        .header-section {
            text-align: center;
            margin-bottom: 25px;
            width: 100%;
        }

        .moh-logo {
            width: 110px;
            height: auto;
            margin-bottom: 10px;
            display: block;
            margin-left: auto;
            margin-right: auto;
        }

        h1 { 
            font-size: 1.6rem; 
            color: #000; 
            margin-bottom: 5px;
        }

        p.subtitle { 
            color: #555; 
            font-size: 0.95rem; 
            font-weight: bold;
        }

        /* حاوية الفورم */
        .form-wrapper {
            width: 100%;
            max-width: 750px;
            background: white; 
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            border: 2px solid var(--gold);
        }

        iframe {
            width: 100%;
            height: 80vh; 
            border: none;
            display: block;
        }

        .back-link {
            margin: 25px 0;
            color: white;
            text-decoration: none;
            font-weight: bold;
            padding: 12px 25px;
            background: var(--navy); /* زر العودة بلون كحلي ليتناسب مع آفاق */
            border-radius: 50px;
            transition: 0.3s;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }
        
        .back-link:hover { 
            transform: translateY(-2px);
            opacity: 0.9;
        }

        @media (max-width: 600px) {
            h1 { font-size: 1.3rem; }
            body { padding: 10px; }
        }
    </style>
</head>
<body>

    <div class="header-section">
        <img src="logo.png" alt="شعار وزارة الصحة" class="moh-logo">
        <h1>وزارة الصحة الفلسطينية</h1>
        <p class="subtitle">بوابة تقديم طلبات المساعدة والتحويلات الطبية</p>
    </div>

    <div class="form-wrapper">
        <iframe src="https://docs.google.com/forms/d/e/1FAIpQLScxrR6we5hAUHVcyAti_LIn5QBzsvY1FDnFuE0zE5SpajGNvA/viewform?embedded=true" frameborder="0" marginheight="0" marginwidth="0">جارٍ التحميل…</iframe>
    </div>

    <a href="application.html" class="back-link">🔙 العودة لبوابة الطلبات</a>

</body>
</html>
