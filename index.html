<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بوابة التقديم - وزارة الصحة | آفاق</title>
    <style>
        :root { 
            --eggplant: #4B0082; /* اللون الباذنجاني */
            --gold: #D4AF37; 
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, sans-serif; }
        
        body { 
            background-color: var(--eggplant); 
            color: white;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 15px;
        }

        .header-section {
            text-align: center;
            margin-top: 10px;
            margin-bottom: 25px;
            width: 100%;
        }

        /* تعديل الشعار ليدمج بشكل أجمل */
        .moh-logo-container {
            background: white; /* خلفية بيضاء دائرية خلف الشعار ليظهر بوضوح */
            width: 120px;
            height: 120px;
            border-radius: 50%; /* جعل الخلفية دائرية */
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0 auto 15px auto;
            border: 3px solid var(--gold); /* برواز ذهبي حول الشعار */
            box-shadow: 0 0 15px rgba(255,255,255,0.2);
        }

        .moh-logo {
            width: 80px; /* حجم الشعار داخل الدائرة */
            height: auto;
        }

        h1 { 
            font-size: 1.6rem; 
            margin-bottom: 8px; 
            text-shadow: 1px 1px 4px rgba(0,0,0,0.3);
        }

        p.subtitle { 
            color: #e0e0e0; 
            font-size: 0.95rem; 
            margin-bottom: 10px;
        }

        /* حاوية الفورم */
        .form-wrapper {
            width: 100%;
            max-width: 750px;
            background: white; 
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            border: 3px solid var(--gold);
        }

        iframe {
            width: 100%;
            height: 80vh; 
            border: none;
            display: block;
        }

        .back-link {
            margin: 25px 0;
            color: white;
            text-decoration: none;
            font-weight: bold;
            display: inline-block;
            padding: 12px 25px;
            background: rgba(255,255,255,0.15);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 50px;
            transition: 0.3s;
        }
        
        .back-link:hover { 
            background: var(--gold); 
            color: var(--eggplant);
        }

        @media (max-width: 600px) {
            h1 { font-size: 1.3rem; }
            .moh-logo-container { width: 100px; height: 100px; }
            .moh-logo { width: 70px; }
        }
    </style>
</head>
<body>

    <div class="header-section">
        <div class="moh-logo-container">
            <img src="logo.png" alt="شعار وزارة الصحة" class="moh-logo">
        </div>
        
        <h1>وزارة الصحة الفلسطينية</h1>
        <p class="subtitle">بوابة تقديم طلبات المساعدة والتحويلات الطبية</p>
    </div>

    <div class="form-wrapper">
        <iframe src="https://docs.google.com/forms/d/e/1FAIpQLScxrR6we5hAUHVcyAti_LIn5QBzsvY1FDnFuE0zE5SpajGNvA/viewform?embedded=true" frameborder="0" marginheight="0" marginwidth="0">جارٍ التحميل…</iframe>
    </div>

    <a href="application.html" class="back-link">🔙 العودة لبوابة الطلبات</a>

    <footer style="margin-bottom: 20px; font-size: 0.8rem; color: rgba(255,255,255,0.5);">
        منصة آفاق - 2026
    </footer>

</body>
</html>
