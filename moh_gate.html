<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بوابة التقديم - وزارة الصحة | آفاق</title>
    <style>
        :root { 
            --eggplant: #4B0082; /* اللون الباذنجاني */
            --gold: #D4AF37; 
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        
        body { 
            background-color: var(--eggplant); 
            color: white;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        .header-section {
            text-align: center;
            margin-bottom: 30px;
            width: 100%;
        }

        .moh-logo {
            width: 120px;
            height: auto;
            margin-bottom: 15px;
            filter: drop-shadow(0 0 8px rgba(255,255,255,0.2));
        }

        h1 { font-size: 1.5rem; margin-bottom: 5px; }
        p { color: #ccc; font-size: 0.9rem; }

        /* حاوية الفورم لضمان التنسيق */
        .form-wrapper {
            width: 100%;
            max-width: 700px;
            background: white; /* خلفية بيضاء للفورم ليبرز النص */
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 15px 35px rgba(0,0,0,0.3);
            border: 4px solid var(--gold);
        }

        iframe {
            width: 100%;
            /* الارتفاع سيتم ضبطه تلقائياً ليناسب محتوى جوجل */
            height: 85vh; 
            border: none;
        }

        .back-link {
            margin-top: 20px;
            color: white;
            text-decoration: none;
            font-weight: bold;
            display: inline-block;
            padding: 10px 20px;
            background: rgba(255,255,255,0.1);
            border-radius: 50px;
            transition: 0.3s;
        }
        .back-link:hover { background: var(--gold); }

        @media (max-width: 600px) {
            .form-wrapper { border-radius: 10px; }
            h1 { font-size: 1.2rem; }
        }
    </style>
</head>
<body>

    <div class="header-section">
        <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/5/5b/Palestine_MOH_Logo.png/600px-Palestine_MOH_Logo.png" alt="شعار وزارة الصحة" class="moh-logo">
        <h1>وزارة الصحة الفلسطينية</h1>
        <p>بوابة تقديم طلبات المساعدة والتحويلات</p>
    </div>

    <div class="form-wrapper">
        <iframe src="https://docs.google.com/forms/d/e/1FAIpQLScxrR6we5hAUHVcyAti_LIn5QBzsvY1FDnFuE0zE5SpajGNvA/viewform?embedded=true" frameborder="0" marginheight="0" marginwidth="0">جارٍ التحميل…</iframe>
    </div>

    <a href="application.html" class="back-link">⬅ عودة لبوابة الطلبات</a>

</body>
</html>
